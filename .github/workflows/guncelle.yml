name: Mac Botu Otomatik Calistir

on:
  schedule:
    - cron: '0 * * * *'  # Hala her saat başı çalışır
  workflow_dispatch:     

jobs:
  build:
    runs-on: ubuntu-latest
    
    # === SAAT DÜZELTME EKLEMESİ ===
    env:
      TZ: Europe/Istanbul
    # ==============================

    permissions:
      contents: write

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: pip install requests beautifulsoup4

    - name: Botu Çalıştır ve Veriyi Çek
      run: python bot.py

    - name: Yeni Verileri GitHub'a Kaydet
      run: |
        git config --global user.name "Mac Botu"
        git config --global user.email "bot@macrehberi.com"
        git add index.html
        git commit -m "⏳ Maçlar güncellendi" || exit 0
        git push
